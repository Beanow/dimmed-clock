name: build-site

on:
  push:
    branches:
      - main

jobs:
  BuildSite:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with:
          version: 10
          cache: true
      - uses: actions/setup-node@v6
        with:
          node-version-file: package.json
      - run: .github/build.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
